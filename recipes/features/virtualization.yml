# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json
modules: 
  - type: dnf
    repos:
      copr:
        - ublue-os/packages
    install:
      packages:        
        - libvirt
        - libvirt-nss
        - ublue-os-libvirt-workarounds
        - cockpit-machines
        - virt-manager
        - virt-v2v
        - virt-viewer

  - type: files
    files:
      - source: virtualization
      - destination: /

  - type: systemd
    system:
      enable: 
      - bluefin-dx-groups.service 
 

